<!doctype html>
<html lang="zh-TW">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>2026 Taiwan Cup Rocket Competition · Level-1 Launch License Mock Exam</title>
<link rel="icon" href="/static/favicon.png" type="image/png" />
<style>
  :root {
    --bg: #0b1020;
    --bg-elev: #131a32;
    --bg-card: #182142;
    --border: #283156;
    --text: #e6ecff;
    --muted: #9aa6cf;
    --accent: #5b8cff;
    --accent-2: #7b5bff;
    --good: #43d39e;
    --bad: #ff6b6b;
    --warn: #ffc857;
    --shadow: 0 10px 30px rgba(0,0,0,.35);
  }
  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Noto Sans TC", "PingFang TC", "Microsoft JhengHei", "Inter", sans-serif;
    background:
      radial-gradient(1200px 600px at 80% -10%, rgba(91,140,255,.15), transparent 60%),
      radial-gradient(900px 600px at -10% 110%, rgba(123,91,255,.12), transparent 60%),
      var(--bg);
    color: var(--text);
    min-height: 100vh;
    line-height: 1.6;
  }
  .container { max-width: 1100px; margin: 0 auto; padding: 24px 20px 80px; }
  header.app {
    display: flex; align-items: center; justify-content: space-between;
    margin-bottom: 24px; gap: 16px; flex-wrap: wrap;
  }
  .brand { display: flex; align-items: center; gap: 12px; }
  .logo {
    width: 44px; height: 44px; border-radius: 12px;
    background: linear-gradient(135deg, var(--accent), var(--accent-2));
    display: grid; place-items: center; color: white; font-weight: 800; font-size: 22px;
    box-shadow: var(--shadow);
  }
  .brand h1 { margin: 0; font-size: 18px; letter-spacing: .5px; }
  .brand p { margin: 0; color: var(--muted); font-size: 13px; }
  .header-actions { display: flex; gap: 10px; align-items: center; flex-wrap: wrap; }
  .back-link {
    color: var(--muted); text-decoration: none; font-size: 13px;
    padding: 6px 12px; border-radius: 8px; border: 1px solid var(--border); background: var(--bg-elev);
  }
  .back-link:hover { color: var(--text); border-color: var(--accent); }

  .lang-toggle { display: flex; gap: 4px; background: var(--bg-elev); padding: 4px; border-radius: 10px; border: 1px solid var(--border); }
  .lang-toggle button {
    border: 0; background: transparent; color: var(--muted);
    padding: 6px 12px; font-size: 13px; border-radius: 7px; cursor: pointer; font-weight: 600;
  }
  .lang-toggle button.active { background: var(--bg-card); color: var(--text); box-shadow: var(--shadow); }

  nav.tabs { display: flex; gap: 4px; background: var(--bg-elev); padding: 4px; border-radius: 12px; border: 1px solid var(--border); }
  nav.tabs button {
    border: 0; background: transparent; color: var(--muted);
    padding: 8px 16px; font-size: 14px; border-radius: 8px; cursor: pointer; font-weight: 600;
  }
  nav.tabs button.active { background: var(--bg-card); color: var(--text); box-shadow: var(--shadow); }
  nav.tabs button:hover:not(.active) { color: var(--text); }

  .card { background: var(--bg-card); border: 1px solid var(--border); border-radius: 16px; padding: 24px; box-shadow: var(--shadow); }
  .grid { display: grid; gap: 16px; }
  .grid-2 { grid-template-columns: repeat(2, minmax(0, 1fr)); }
  .grid-3 { grid-template-columns: repeat(3, minmax(0, 1fr)); }
  .grid-4 { grid-template-columns: repeat(4, minmax(0, 1fr)); }
  @media (max-width: 800px) {
    .grid-2, .grid-3, .grid-4 { grid-template-columns: 1fr; }
  }

  .stat { display: flex; flex-direction: column; gap: 4px; padding: 18px; background: var(--bg-elev); border: 1px solid var(--border); border-radius: 12px; }
  .stat .label { color: var(--muted); font-size: 13px; }
  .stat .value { font-size: 24px; font-weight: 700; }
  .stat .hint { color: var(--muted); font-size: 12px; }

  h2 { margin: 28px 0 12px; font-size: 22px; }
  h3 { margin: 20px 0 10px; font-size: 17px; }
  p.lead { color: var(--muted); margin-top: 0; font-size: 15px; }

  .btn {
    display: inline-flex; align-items: center; gap: 8px;
    border: 0; cursor: pointer; font-weight: 600; font-size: 15px;
    padding: 12px 20px; border-radius: 10px;
    background: linear-gradient(135deg, var(--accent), var(--accent-2));
    color: white; box-shadow: 0 4px 14px rgba(91,140,255,.3);
    transition: transform .08s ease, box-shadow .2s ease;
  }
  .btn:hover { transform: translateY(-1px); box-shadow: 0 6px 18px rgba(91,140,255,.4); }
  .btn:active { transform: translateY(0); }
  .btn.secondary { background: var(--bg-elev); color: var(--text); border: 1px solid var(--border); box-shadow: none; }
  .btn.secondary:hover { background: var(--bg-card); }
  .btn.ghost { background: transparent; color: var(--muted); box-shadow: none; }
  .btn.ghost:hover { color: var(--text); background: var(--bg-elev); }
  .btn.danger { background: var(--bad); }
  .btn.success { background: var(--good); }
  .btn:disabled { opacity: .5; cursor: not-allowed; }

  .pill { display: inline-block; padding: 4px 10px; border-radius: 999px; font-size: 12px; font-weight: 600; background: var(--bg-elev); color: var(--muted); border: 1px solid var(--border); }
  .pill.good { color: var(--good); border-color: rgba(67,211,158,.4); background: rgba(67,211,158,.08); }
  .pill.bad { color: var(--bad); border-color: rgba(255,107,107,.4); background: rgba(255,107,107,.08); }
  .pill.warn { color: var(--warn); border-color: rgba(255,200,87,.4); background: rgba(255,200,87,.08); }
  .pill.accent { color: var(--accent); border-color: rgba(91,140,255,.4); background: rgba(91,140,255,.08); }

  .hero { text-align: center; padding: 32px 20px 12px; }
  .hero h2 {
    font-size: 36px; line-height: 1.2; margin: 0 0 12px;
    background: linear-gradient(135deg, var(--text), var(--accent));
    -webkit-background-clip: text; background-clip: text; color: transparent;
  }
  .hero p { color: var(--muted); max-width: 640px; margin: 0 auto; font-size: 16px; }
  .home-cards { margin-top: 28px; }
  .home-card { background: var(--bg-card); border: 1px solid var(--border); border-radius: 16px; padding: 28px; cursor: pointer; transition: transform .1s ease, border-color .2s; box-shadow: var(--shadow); }
  .home-card:hover { transform: translateY(-2px); border-color: var(--accent); }
  .home-card .icon { font-size: 32px; margin-bottom: 12px; }
  .home-card h3 { margin: 0 0 8px; font-size: 20px; }
  .home-card p { margin: 0; color: var(--muted); font-size: 14px; }
  .badge-row { display: flex; gap: 8px; flex-wrap: wrap; margin: 8px 0 0; }

  .exam-header {
    display: flex; justify-content: space-between; align-items: center; gap: 16px; flex-wrap: wrap;
    background: var(--bg-card); border: 1px solid var(--border); border-radius: 14px;
    padding: 14px 20px; margin-bottom: 16px; position: sticky; top: 12px; z-index: 10;
    backdrop-filter: blur(10px);
  }
  .timer { font-variant-numeric: tabular-nums; font-weight: 700; font-size: 22px; letter-spacing: 1px; color: var(--accent); }
  .timer.warn { color: var(--warn); }
  .timer.danger { color: var(--bad); animation: pulse 1s infinite; }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.55} }
  .progress-text { color: var(--muted); font-size: 13px; }
  .progress-bar { height: 6px; background: var(--bg-elev); border-radius: 999px; overflow: hidden; flex: 1; min-width: 120px; }
  .progress-bar > span { display: block; height: 100%; background: linear-gradient(90deg, var(--accent), var(--accent-2)); transition: width .3s; }

  .question-card { background: var(--bg-card); border: 1px solid var(--border); border-radius: 16px; padding: 28px; box-shadow: var(--shadow); margin-bottom: 16px; }
  .qmeta { display: flex; gap: 10px; margin-bottom: 12px; align-items: center; }
  .qtext { font-size: 17px; font-weight: 600; margin: 0 0 18px; line-height: 1.6; }
  .options { display: flex; flex-direction: column; gap: 10px; }
  .option { display: flex; align-items: flex-start; gap: 14px; cursor: pointer; padding: 14px 16px; background: var(--bg-elev); border: 2px solid var(--border); border-radius: 10px; transition: all .15s; }
  .option:hover { border-color: var(--accent); }
  .option.selected { border-color: var(--accent); background: rgba(91,140,255,.08); }
  .option .marker { flex: 0 0 32px; height: 32px; border-radius: 8px; background: var(--bg-card); display: grid; place-items: center; font-weight: 700; color: var(--muted); border: 1px solid var(--border); }
  .option.selected .marker { background: var(--accent); color: white; border-color: var(--accent); }
  .option .text { flex: 1; }

  .nav-grid { display: grid; grid-template-columns: repeat(10, 1fr); gap: 6px; }
  @media (max-width: 600px) { .nav-grid { grid-template-columns: repeat(8, 1fr); } }
  .nav-grid button { aspect-ratio: 1; min-height: 36px; border-radius: 8px; border: 1px solid var(--border); background: var(--bg-elev); color: var(--muted); font-weight: 600; cursor: pointer; font-size: 13px; transition: all .1s; }
  .nav-grid button.answered { background: rgba(91,140,255,.18); color: var(--text); border-color: var(--accent); }
  .nav-grid button.flagged { box-shadow: inset 0 0 0 2px var(--warn); }
  .nav-grid button.current { outline: 3px solid var(--accent); outline-offset: 2px; }

  .footer-bar { display: flex; gap: 10px; justify-content: space-between; flex-wrap: wrap; }

  .score-ring {
    width: 220px; height: 220px; border-radius: 50%; display: grid; place-items: center; margin: 12px auto 24px;
    background: conic-gradient(var(--ring-color, var(--accent)) calc(var(--p) * 1%), var(--bg-elev) 0);
    position: relative;
  }
  .score-ring::before { content: ""; position: absolute; inset: 14px; border-radius: 50%; background: var(--bg-card); }
  .score-ring .inner { position: relative; text-align: center; }
  .score-ring .num { font-size: 56px; font-weight: 800; line-height: 1; }
  .score-ring .lbl { color: var(--muted); font-size: 13px; margin-top: 6px; }

  .review-item { padding: 16px; border: 1px solid var(--border); border-radius: 12px; background: var(--bg-elev); margin-bottom: 10px; }
  .review-item .qhead { font-weight: 600; margin-bottom: 6px; }
  .review-item .opt { padding: 6px 10px; border-radius: 6px; margin: 4px 0; font-size: 14px; }
  .review-item .opt.correct { background: rgba(67,211,158,.12); color: var(--good); }
  .review-item .opt.user { background: rgba(255,107,107,.12); color: var(--bad); }

  .study-toc { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 20px; }
  .study-toc button { padding: 8px 14px; border-radius: 999px; border: 1px solid var(--border); background: var(--bg-elev); color: var(--muted); cursor: pointer; font-weight: 600; font-size: 13px; }
  .study-toc button.active { background: var(--accent); color: white; border-color: var(--accent); }

  details { background: var(--bg-elev); border: 1px solid var(--border); border-radius: 12px; padding: 14px 18px; margin-bottom: 8px; }
  details summary { cursor: pointer; font-weight: 600; outline: none; list-style: none; display: flex; gap: 12px; align-items: flex-start; }
  details summary::-webkit-details-marker { display: none; }
  details summary::before { content: "▶"; color: var(--muted); font-size: 11px; transition: transform .2s; margin-top: 6px; }
  details[open] summary::before { transform: rotate(90deg); }
  details .ans-block { margin-top: 12px; padding-top: 12px; border-top: 1px dashed var(--border); }
  details .opt { padding: 6px 12px; border-radius: 6px; margin: 4px 0; font-size: 14px; }
  details .opt.correct { background: rgba(67,211,158,.12); color: var(--good); font-weight: 600; }
  details .opt.normal { color: var(--muted); }

  .keypoints { display: grid; gap: 10px; }
  .keypoint { padding: 14px 16px; background: var(--bg-elev); border: 1px solid var(--border); border-radius: 10px; border-left: 4px solid var(--accent); }
  .keypoint b { color: var(--accent); }

  .search-input { width: 100%; padding: 12px 16px; background: var(--bg-elev); border: 1px solid var(--border); border-radius: 10px; color: var(--text); font-size: 14px; margin-bottom: 16px; }
  .search-input:focus { outline: 2px solid var(--accent); outline-offset: -1px; }

  .hide { display: none !important; }

  table.summary { width: 100%; border-collapse: collapse; margin: 8px 0; }
  table.summary th, table.summary td { padding: 10px 12px; border-bottom: 1px solid var(--border); text-align: left; font-size: 14px; }
  table.summary th { color: var(--muted); font-weight: 600; }

  .modal-bg { position: fixed; inset: 0; background: rgba(10,15,35,.6); display: grid; place-items: center; z-index: 100; backdrop-filter: blur(4px); }
  .modal { background: var(--bg-card); border: 1px solid var(--border); border-radius: 16px; padding: 28px; max-width: 460px; width: 92%; box-shadow: var(--shadow); }
  .modal h3 { margin-top: 0; }
  .modal-actions { display: flex; gap: 10px; justify-content: flex-end; margin-top: 20px; flex-wrap: wrap; }

  .guide-toc { background: var(--bg-card); border: 1px solid var(--border); border-radius: 14px; padding: 16px 20px; margin-bottom: 24px; position: sticky; top: 12px; z-index: 5; backdrop-filter: blur(10px); }
  .guide-toc-head { display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px; }
  .guide-toc h3 { margin: 0; font-size: 13px; color: var(--muted); text-transform: uppercase; letter-spacing: 1.5px; }
  .guide-toc ol { margin: 0; padding-left: 20px; display: grid; grid-template-columns: repeat(2, 1fr); gap: 4px 16px; }
  @media (max-width: 700px) { .guide-toc ol { grid-template-columns: 1fr; } }
  .guide-toc li { padding: 4px 0; }
  .guide-toc a { color: var(--text); text-decoration: none; font-size: 14px; font-weight: 500; }
  .guide-toc a:hover { color: var(--accent); }
  .guide-toc a small { color: var(--muted); margin-left: 4px; font-weight: 400; }

  .chapter { background: var(--bg-card); border: 1px solid var(--border); border-radius: 16px; padding: 32px; margin-bottom: 24px; box-shadow: var(--shadow); scroll-margin-top: 100px; }
  .chapter > h2 { font-size: 26px; margin: 0 0 8px; padding-bottom: 14px; border-bottom: 2px solid var(--border); display: flex; align-items: baseline; gap: 14px; flex-wrap: wrap; }
  .chapter > h2 .chapter-num { color: white; font-size: 13px; font-weight: 700; letter-spacing: 1px; background: linear-gradient(135deg, var(--accent), var(--accent-2)); padding: 4px 12px; border-radius: 999px; }
  .chapter .lead { font-size: 15px; color: var(--muted); margin: 16px 0 8px; line-height: 1.85; }
  .chapter h3 { font-size: 18px; margin: 32px 0 10px; color: var(--text); display: flex; align-items: center; gap: 10px; }
  .chapter h3::before { content: ""; width: 4px; height: 18px; background: linear-gradient(180deg, var(--accent), var(--accent-2)); border-radius: 2px; display: inline-block; }
  .chapter h4 { font-size: 14px; margin: 20px 0 6px; color: var(--accent); font-weight: 700; letter-spacing: .5px; }
  .chapter p { font-size: 15px; line-height: 1.85; margin: 10px 0; color: var(--text); }
  .chapter ul, .chapter ol { line-height: 1.85; padding-left: 22px; }
  .chapter li { margin-bottom: 4px; }
  .chapter b, .chapter strong { color: var(--accent); }
  .chapter code { background: var(--bg-elev); padding: 2px 8px; border-radius: 5px; font-family: "SF Mono", Menlo, Consolas, monospace; font-size: 13px; color: var(--accent-2); border: 1px solid var(--border); }

  .flow-diagram { text-align: center; padding: 18px; background: var(--bg-elev); border-radius: 12px; border: 1px dashed var(--border); margin: 14px 0; font-weight: 600; font-size: 15px; color: var(--text); letter-spacing: 1px; }
  .flow-diagram .arrow { color: var(--accent); margin: 0 6px; }

  .callout { padding: 14px 18px; margin: 14px 0; border-radius: 10px; background: rgba(91,140,255,.06); border-left: 4px solid var(--accent); font-size: 14px; line-height: 1.8; }
  .callout.warn { background: rgba(255,200,87,.07); border-left-color: var(--warn); }
  .callout.danger { background: rgba(255,107,107,.07); border-left-color: var(--bad); }
  .callout.tip { background: rgba(67,211,158,.07); border-left-color: var(--good); }
  .callout strong { display: inline-block; margin-right: 6px; color: var(--accent); }
  .callout.warn strong { color: var(--warn); }
  .callout.danger strong { color: var(--bad); }
  .callout.tip strong { color: var(--good); }

  .fact-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 10px; margin: 16px 0; }
  .fact { background: var(--bg-elev); border: 1px solid var(--border); border-radius: 10px; padding: 12px 14px; font-size: 13px; }
  .fact .key { color: var(--muted); font-size: 12px; margin-bottom: 4px; }
  .fact .val { font-size: 18px; font-weight: 700; color: var(--accent); font-variant-numeric: tabular-nums; }

  .chapter-nav { display: flex; justify-content: space-between; gap: 10px; margin-top: 24px; padding-top: 20px; border-top: 1px solid var(--border); }
  .chapter-nav a { color: var(--muted); text-decoration: none; font-size: 14px; padding: 8px 14px; border: 1px solid var(--border); border-radius: 8px; background: var(--bg-elev); }
  .chapter-nav a:hover { color: var(--accent); border-color: var(--accent); }
  .chapter-nav a.disabled { opacity: .35; pointer-events: none; }
</style>
</head>

<div class="container">
  <header class="app">
    <div class="brand">
      <div class="logo">🚀</div>
      <div>
        <h1 id="brand-title"></h1>

    <div class="header-actions">

  <section id="view-study" class="hide"></section>
</div>

let LANG = (() => {
  try {
    const saved = localStorage.getItem("rocket-exam.lang");
    if (saved === "en" || saved === "zh-TW") return saved;
  } catch { /* ignore */ }
  const nav = (navigator.language || "").toLowerCase();
  return nav.startsWith("zh") ? "zh-TW" : "en";
})();

function t(path) {
  const parts = path.split(".");
  let v = I18N[LANG];
  for (const p of parts) v = v && v[p];
  return v;
}
function loc(obj) { return (obj && (obj[LANG] ?? obj["zh-TW"])) ?? ""; }
function fmt(s, params) { return s.replace(/\{(\w+)\}/g, (_, k) => String(params[k] ?? "")); }
function shuffle(arr) {
  const a = arr.slice();
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}
function fmtTime(s) {
  s = Math.max(0, s | 0);
  const m = (s / 60) | 0, ss = s % 60;
  return String(m).padStart(2, "0") + ":" + String(ss).padStart(2, "0");
}
function letter(i) { return ["A", "B", "C", "D"][i]; }

/* =========================================================================
   Exam view
   ========================================================================= */
const EXAM = {
  questions: [], answers: [], flags: [],
  current: 0, startAt: 0, timer: null,
  remaining: 30 * 60, state: "intro", submittedAt: 0,
  options: { shuffleOptions: true }
};

function pickQuestions() {
  const out = [];
  for (const key of Object.keys(BANK)) {
    const cat = BANK[key];
    const picks = shuffle(cat.questions).slice(0, cat.take);
    for (const p of picks) {
      let order = [0, 1, 2, 3];
      if (EXAM.options.shuffleOptions) order = shuffle(order);
      const newOpts = order.map(i => p.o[i]);
      const newAns = order.indexOf(p.a);
      out.push({ category: cat.title, q: p.q, o: newOpts, a: newAns });
    }
  }
  return shuffle(out);
}

function renderExam() {
  const root = document.getElementById("view-exam");
  const e = t("exam");
  if (EXAM.state === "intro") {
    root.innerHTML = `
      <div class="card">
        <h2 style="margin-top:0;">${e.introTitle}</h2>
        <p class="lead">${e.introLead}</p>
        <div class="grid grid-2">
          ${e.introStats.map(s => `<div class="stat"><span class="label">${s.label}</span><span class="value">${s.value}</span><span class="hint">${s.hint}</span></div>`).join("")}
        </div>
        <h3>${e.noticeTitle}</h3>
        <ul style="color:var(--muted); padding-left: 20px;">
          ${e.notices.map(n => `<li>${n}</li>`).join("")}
        </ul>
        <div class="footer-bar" style="margin-top:20px;">
          <button class="btn ghost" onclick="showView('home')">${e.back}</button>
          <button class="btn" onclick="startExam()">${e.start}</button>
        </div>
      </div>`;
    return;
  }
  if (EXAM.state === "running") return renderExamRunning();
  if (EXAM.state === "submitted") return renderResult();
}

function startExam() {
  EXAM.questions = pickQuestions();
  EXAM.answers = Array(EXAM.questions.length).fill(-1);
  EXAM.flags = Array(EXAM.questions.length).fill(false);
  EXAM.current = 0;
  EXAM.startAt = Date.now();
  EXAM.remaining = 30 * 60;
  EXAM.state = "running";
  if (EXAM.timer) clearInterval(EXAM.timer);
  EXAM.timer = setInterval(tick, 1000);
  renderExam();
}

function tick() {
  EXAM.remaining--;
  const tEl = document.getElementById("timer");
  if (tEl) {
    tEl.textContent = fmtTime(EXAM.remaining);
    tEl.classList.toggle("warn", EXAM.remaining <= 300 && EXAM.remaining > 60);
    tEl.classList.toggle("danger", EXAM.remaining <= 60);
  }
  if (EXAM.remaining <= 0) submitExam(true);
}

function renderExamRunning() {
  const root = document.getElementById("view-exam");
  const e = t("exam");
  const total = EXAM.questions.length;
  const i = EXAM.current;
  const q = EXAM.questions[i];
  const answeredCount = EXAM.answers.filter(x => x >= 0).length;
  root.innerHTML = `
    <div class="exam-header">
      <div class="progress-text"><b>${fmt(e.progress, { i: i + 1, n: total })}</b> · ${fmt(e.answered, { n: answeredCount })}</div>
      <div class="progress-bar"><span style="width:${(answeredCount / total * 100).toFixed(1)}%"></span></div>
      <div id="timer" class="timer">${fmtTime(EXAM.remaining)}</div>
    </div>
    <div class="question-card">
      <div class="qmeta">
        <span class="pill accent">${loc(q.category)}</span>
        <span class="pill ${EXAM.flags[i] ? "warn" : ""}" style="cursor:pointer;" onclick="toggleFlag()">${EXAM.flags[i] ? e.flagOn : e.flagOff}</span>
      </div>
      <p class="qtext">${i + 1}. ${loc(q.q)}</p>
      <div class="options">
        ${q.o.map((opt, k) => `
          <label class="option ${EXAM.answers[i] === k ? "selected" : ""}" onclick="pick(${k})">
            <span class="marker">${letter(k)}</span>
            <span class="text">${loc(opt)}</span>
          </label>`).join("")}
      </div>
    </div>
    <div class="card">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px;flex-wrap:wrap;gap:8px;">
        <h3 style="margin:0;">${e.navTitle}</h3>
        <span style="color:var(--muted);font-size:13px;">${e.navHint}</span>
      </div>
      <div class="nav-grid">
        ${EXAM.questions.map((_, k) => `
          <button class="${EXAM.answers[k] >= 0 ? "answered" : ""} ${EXAM.flags[k] ? "flagged" : ""} ${k === i ? "current" : ""}" onclick="goTo(${k})">${k + 1}</button>
        `).join("")}
      </div>
    </div>
    <div class="footer-bar" style="margin-top:16px;">
      <button class="btn secondary" onclick="prev()" ${i === 0 ? "disabled" : ""}>${e.prev}</button>
      <div style="display:flex;gap:10px;">
        <button class="btn danger" onclick="confirmSubmit()">${e.submit}</button>
        ${i === total - 1 ? `<button class="btn success" onclick="confirmSubmit()">${e.finish}</button>` : `<button class="btn" onclick="next()">${e.next}</button>`}
      </div>
    </div>`;
}

function pick(k) { EXAM.answers[EXAM.current] = k; renderExamRunning(); }
function next() { if (EXAM.current < EXAM.questions.length - 1) EXAM.current++; renderExamRunning(); }
function prev() { if (EXAM.current > 0) EXAM.current--; renderExamRunning(); }
function goTo(k) { EXAM.current = k; renderExamRunning(); }
function toggleFlag() { EXAM.flags[EXAM.current] = !EXAM.flags[EXAM.current]; renderExamRunning(); }

function confirmSubmit() {
  const e = t("exam");
  const unanswered = EXAM.answers.filter(x => x < 0).length;
  const flagged = EXAM.flags.filter(Boolean).length;
  const m = document.createElement("div");
  m.className = "modal-bg";
  m.innerHTML = `
    <div class="modal">
      <h3>${e.confirmTitle}</h3>
      <p>${fmt(e.confirmStats, { u: unanswered, f: flagged })}</p>
      <p style="color:var(--muted);font-size:13px;">${e.confirmNote}</p>
      <div class="modal-actions">
        <button class="btn ghost" onclick="this.closest('.modal-bg').remove()">${e.cancel}</button>
        <button class="btn danger" id="confirm-submit-btn">${e.confirmBtn}</button>
      </div>
    </div>`;
  document.body.appendChild(m);
  m.querySelector("#confirm-submit-btn").onclick = () => { m.remove(); submitExam(false); };
}

function submitExam(timeUp) {
  if (EXAM.timer) clearInterval(EXAM.timer);
  EXAM.submittedAt = Date.now();
  EXAM.state = "submitted";
  let score = 0;
  EXAM.questions.forEach((q, i) => { if (EXAM.answers[i] === q.a) score++; });
  const used = 30 * 60 - EXAM.remaining;
  try {
    localStorage.setItem("rocket-exam.last", JSON.stringify({ at: Date.now(), score, used, timeUp }));
  } catch { /* ignore */ }
  renderExam();
}

function renderResult() {
  const root = document.getElementById("view-exam");
  const e = t("exam");
  const total = EXAM.questions.length;
  let score = 0;
  const byCat = {};
  EXAM.questions.forEach((q, i) => {
    const ok = EXAM.answers[i] === q.a;
    if (ok) score++;
    const catName = loc(q.category);
    byCat[catName] = byCat[catName] || { ok: 0, total: 0 };
    byCat[catName].total++;
    if (ok) byCat[catName].ok++;
  });
  const passed = score >= 35;
  const used = 30 * 60 - EXAM.remaining;
  const pct = Math.round(score / total * 100);
  const ringColor = passed ? "var(--good)" : "var(--bad)";
  const summaryText = fmt(e.passSummary, { t: fmtTime(used) }) + (EXAM.remaining <= 0 ? e.timedOut : "");

  root.innerHTML = `
    <div class="card" style="text-align:center;">
      <div class="score-ring" style="--p:${pct};--ring-color:${ringColor};">
        <div class="inner">
          <div class="num" style="color:${passed ? "var(--good)" : "var(--bad)"};">${score}</div>
          <div class="lbl">/ 40 (${pct}%)</div>
        </div>
      </div>
      <h2 style="margin:0 0 8px;">${passed ? e.passTitle : e.failTitle}</h2>
      <p style="color:var(--muted);margin:0;">${summaryText}</p>
      <div style="margin-top:16px; display:flex; gap:10px; justify-content:center; flex-wrap:wrap;">
        <button class="btn" onclick="EXAM.state='intro'; renderExam();">${e.retry}</button>
        <button class="btn secondary" onclick="showView('study')">${e.goStudy}</button>
        <button class="btn ghost" onclick="showView('home')">${e.goHome}</button>
      </div>
    </div>
    <h2>${e.catTitle}</h2>
    <div class="grid grid-4">
      ${Object.entries(byCat).map(([cat, s]) => {
        const p = Math.round(s.ok / s.total * 100);
        return `<div class="stat"><span class="label">${cat}</span><span class="value">${s.ok} / ${s.total}</span><span class="hint">${p}%</span></div>`;
      }).join("")}
    </div>
    <h2>${e.detailTitle}</h2>
    <div id="review-controls" style="display:flex;gap:8px;flex-wrap:wrap;margin-bottom:12px;">
      <button class="btn secondary" onclick="filterReview('all')">${e.filterAll}</button>
      <button class="btn secondary" onclick="filterReview('wrong')">${e.filterWrong}</button>
      <button class="btn secondary" onclick="filterReview('flag')">${e.filterFlag}</button>
    </div>
    <div id="review-list">${reviewListHTML("all")}</div>`;
}

function filterReview(mode) { document.getElementById("review-list").innerHTML = reviewListHTML(mode); }
function reviewListHTML(mode) {
  const e = t("exam");
  const out = EXAM.questions.map((q, i) => {
    const userAns = EXAM.answers[i];
    const ok = userAns === q.a;
    if (mode === "wrong" && ok) return "";
    if (mode === "flag" && !EXAM.flags[i]) return "";
    return `
      <div class="review-item">
        <div class="qhead">
          <span class="pill ${ok ? "good" : (userAns < 0 ? "warn" : "bad")}">${ok ? e.correct : (userAns < 0 ? e.noAnswer : e.wrong)}</span>
          <span class="pill" style="margin-left:6px;">${loc(q.category)}</span>
          ${EXAM.flags[i] ? `<span class="pill warn" style="margin-left:6px;">⚑</span>` : ""}
        </div>
        <div style="font-weight:600;margin:8px 0;">${i + 1}. ${loc(q.q)}</div>
        ${q.o.map((opt, k) => {
          let cls = "";
          if (k === q.a) cls = "correct";
          else if (k === userAns) cls = "user";
          return `<div class="opt ${cls}">${letter(k)}. ${loc(opt)}${k === q.a ? e.answerMark : ""}${k === userAns && k !== q.a ? e.yourAnswer : ""}</div>`;
        }).join("")}
      </div>`;
  }).join("");
  return out || `<div class="card" style="text-align:center;color:var(--muted);">${e.noMatch}</div>`;
}

/* =========================================================================
   Guide view
   ========================================================================= */
function renderGuide() {
  const root = document.getElementById("view-guide");
  const g = t("guide");
  const chapters = GUIDE[LANG] || GUIDE["zh-TW"];
  root.innerHTML = `
    <div class="guide-toc">
      <div class="guide-toc-head">
        <h3>${g.tocHead}</h3>
        <span style="color:var(--muted);font-size:12px;">${g.tocHint}</span>
      </div>
      <ol>
        ${chapters.map((c, i) => `<li><a href="#${c.id}">${g.tocItems[i][0]} <small>— ${g.tocItems[i][1]}</small></a></li>`).join("")}
      </ol>
    </div>
    ${chapters.map((c, i) => `
      <article id="${c.id}" class="chapter">
        <h2><span class="chapter-num">${g.chapterLabel[i]}</span> ${c.title}</h2>
        <p class="lead">${c.lead}</p>
        ${c.body}
        <div class="chapter-nav">
          <a href="${i > 0 ? "#" + chapters[i - 1].id : "#"}" class="${i === 0 ? "disabled" : ""}">${g.prev}${i > 0 ? ": " + g.tocItems[i - 1][0] : ""}</a>
          <a href="${i < chapters.length - 1 ? "#" + chapters[i + 1].id : "#" + chapters[0].id}">${i < chapters.length - 1 ? g.next + ": " + g.tocItems[i + 1][0] : g.tocItems[0][0]} →</a>
        </div>
      </article>
    `).join("")}
  `;
  root.querySelectorAll('a[href^="#"]').forEach(a => {
    a.addEventListener("click", ev => {
      const id = a.getAttribute("href").slice(1);
      if (!id) return;
      const target = document.getElementById(id);
      if (target) {
        ev.preventDefault();
        target.scrollIntoView({ behavior: "smooth", block: "start" });
      }
    });
  });
}

/* =========================================================================
   Study view
   ========================================================================= */
let STUDY_CAT = "all";

function renderStudy() {
  const root = document.getElementById("view-study");
  const s = t("study");
  const kp = KEYPOINTS[LANG] || KEYPOINTS["zh-TW"];
  root.innerHTML = `
    <div class="card">
      <h2 style="margin-top:0;">${s.ruleTitle}</h2>
      <p class="lead">${s.ruleLead}</p>
      <div class="grid grid-3">
        <div class="stat"><span class="label">${s.stat1Label}</span><span class="value" style="font-size:16px;line-height:1.4;">${s.stat1Val}</span></div>
        <div class="stat"><span class="label">${s.stat2Label}</span><span class="value" style="font-size:16px;">${s.stat2Val}</span></div>
        <div class="stat"><span class="label">${s.stat3Label}</span><span class="value" style="font-size:16px;">${s.stat3Val}</span></div>
      </div>
      <h3>${s.distTitle}</h3>
      <table class="summary">
        <thead><tr>${s.distHeads.map(h => `<th>${h}</th>`).join("")}</tr></thead>
        <tbody>${s.distRows.map(r => `<tr>${r.map(c => `<td>${c}</td>`).join("")}</tr>`).join("")}</tbody>
      </table>
    </div>
    <h2>${s.keyTitle}</h2>
    <div id="keypoints">${kp.map(group => `
      <h3>${group.cat}</h3>
      <div class="keypoints">${group.items.map(it => `<div class="keypoint">${it}</div>`).join("")}</div>
    `).join("")}</div>
    <h2>${s.bankTitle}</h2>
    <input class="search-input" id="study-search" placeholder="${s.searchPh}" oninput="filterStudy()" />
    <div class="study-toc" id="study-toc">
      <button class="${STUDY_CAT === "all" ? "active" : ""}" data-cat="all" onclick="setStudyCat('all', this)">${s.tocAll}</button>
      ${Object.values(BANK).map(c => `<button class="${STUDY_CAT === loc(c.title) ? "active" : ""}" data-cat="${loc(c.title)}" onclick="setStudyCat('${loc(c.title).replace(/'/g, "\\'")}', this)">${loc(c.title)} (${c.questions.length})</button>`).join("")}
    </div>
    <div id="study-list">${studyListHTML(STUDY_CAT, "")}</div>`;
}

function setStudyCat(cat, el) {
  STUDY_CAT = cat;
  document.querySelectorAll("#study-toc button").forEach(b => b.classList.toggle("active", b.dataset.cat === cat));
  filterStudy();
}
function filterStudy() {
  const q = document.getElementById("study-search").value.trim();
  document.getElementById("study-list").innerHTML = studyListHTML(STUDY_CAT, q);
}
function studyListHTML(cat, kw) {
  const s = t("study");
  const out = [];
  let n = 0;
  for (const key of Object.keys(BANK)) {
    const c = BANK[key];
    const catName = loc(c.title);
    if (cat !== "all" && catName !== cat) continue;
    c.questions.forEach((q, idx) => {
      const text = (loc(q.q) + " " + q.o.map(loc).join(" ")).toLowerCase();
      if (kw && !text.includes(kw.toLowerCase())) return;
      n++;
      out.push(`
        <details>
          <summary>
            <span class="pill accent" style="flex:0 0 auto;">${catName}</span>
            <span><b>${idx + 1}.</b> ${loc(q.q)}</span>
          </summary>
          <div class="ans-block">
            ${q.o.map((opt, k) => `<div class="opt ${k === q.a ? "correct" : "normal"}">${letter(k)}. ${loc(opt)}${k === q.a ? "  ✓" : ""}</div>`).join("")}
          </div>
        </details>`);
    });
  }
  if (!out.length) return `<div class="card" style="text-align:center;color:var(--muted);">${s.noMatch || "—"}</div>`;
  return `<p style="color:var(--muted);font-size:13px;">${fmt(s.countLine, { n })}</p>` + out.join("");
}

/* init */
renderChrome();
renderHome();
</script>
